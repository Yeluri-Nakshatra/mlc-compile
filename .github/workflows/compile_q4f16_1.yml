name: Compile Qwen3-0.6B-q4f16_1 for Android

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mlc-llm
        uses: actions/checkout@v4
        with:
          repository: mlc-ai/mlc-llm
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install build deps and debug LLVM
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build llvm-15-dev lld-15 clang-15 libtinfo-dev git-lfs opencl-headers
          git lfs install
          echo "=== LLVM targets ==="
          llvm-config-15 --targets-built 2>/dev/null || echo "llvm-config not found"
          llvm-config-15 --help 2>&1 | head -5 || true
          echo "=== clang targets ==="
          clang-15 --print-targets 2>/dev/null || true
          pip install psutil requests tqdm numpy
          # Find TVM dir and set for subsequent steps
          if [ -d "3rdparty/tvm" ]; then TVM=3rdparty/tvm
          elif [ -d "tvm" ]; then TVM=tvm
          else echo "TVM not found!"; exit 1; fi
          echo "TVM_DIR=$TVM" >> $GITHUB_ENV
          # Check TVM Python structure
          echo "=== tvm/__init__.py (first 30 lines) ==="
          head -30 $TVM/python/tvm/__init__.py 2>/dev/null || echo "(no __init__.py)"
          echo "=== ls tvm/python/tvm ==="
          ls -la $TVM/python/tvm/
          echo "=== Looking for setup.py ==="
          find $TVM -name "setup.py" -maxdepth 3 2>/dev/null
          echo "=== Looking for _ffi ==="
          find $TVM -name "_ffi" -maxdepth 4 2>/dev/null

      - name: Build TVM from source
        run: |
          cd $TVM_DIR
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_LLVM=llvm-config-15 \
            -DUSE_VULKAN=OFF \
            -DUSE_CUDA=OFF \
            -DUSE_OPENCL=ON \
            -DUSE_METAL=OFF \
            -DUSE_ROCM=OFF
          ninja -j$(nproc)
          # TVM split build doesn't produce libtvm.so; create symlink
          LIBDIR="$PWD/lib"
          echo "TVM_BUILD_DIR=$PWD" >> $GITHUB_ENV
          echo "TVM_LIB_DIR=$LIBDIR" >> $GITHUB_ENV
          ls -la "$LIBDIR"/*.so 2>/dev/null
          if [ -f "$LIBDIR/libtvm_compiler.so" ] && [ ! -f "$LIBDIR/libtvm.so" ]; then
            ln -sf "libtvm_compiler.so" "$LIBDIR/libtvm.so"
            echo "Created libtvm.so -> libtvm_compiler.so"
          fi
          echo "PYTHONPATH=${{ github.workspace }}/$TVM_DIR/python" >> $GITHUB_ENV

      - name: Patch tvm.contrib modules
        run: |
          CONTRIB="${{ github.workspace }}/$TVM_DIR/python/tvm/contrib"
          # ndk.py - no _ffi import, use subprocess directly
          grep -q "create_shared" "$CONTRIB/ndk.py" 2>/dev/null || printf 'import subprocess\ndef create_shared(output, objects, options=None, cc_exe="aarch64-linux-android24-clang"):\n    cmd = [cc_exe, "-shared", "-o", output] + list(objects)\n    if options:\n        cmd.extend(options)\n    subprocess.check_call(cmd)\n    return output\ndef cross_compiler(compile_func):\n    return compile_func\n' > "$CONTRIB/ndk.py"
          # tar.py
          grep -q "tar(" "$CONTRIB/tar.py" 2>/dev/null || printf 'import os, tarfile\ndef tar(output, files):\n    with tarfile.open(output, "w:") as tf:\n        for f in files:\n            tf.add(f, arcname=os.path.basename(f))\n    return output\n' > "$CONTRIB/tar.py"
          # xcode.py
          [ -f "$CONTRIB/xcode.py" ] || printf '# stub\n' > "$CONTRIB/xcode.py"
          echo "Patched contrib modules"

      - name: Patch @T.prim_func decorators for s_tir compatibility
        run: |
          # Only files with T.sblock_alloc_buffer need s_tir=True
          find python/mlc_llm -name '*.py' -exec grep -l 'T\.sblock_alloc_buffer' {} \; | while read f; do
            echo "Patching $f (uses sblock_alloc_buffer)"
            # Replace bare @T.prim_func
            sed -i 's/@T\.prim_func$/@T.prim_func(s_tir=True, check_well_formed=False)/' "$f"
            # Replace @T.prim_func(private=True)
            sed -i 's/@T\.prim_func(private=True)$/@T.prim_func(private=True, s_tir=True, check_well_formed=False)/' "$f"
            # Replace @T.prim_func(check_well_formed=False) [safety]
            sed -i 's/@T\.prim_func(check_well_formed=False)$/@T.prim_func(s_tir=True, check_well_formed=False)/' "$f"
          done
          # Files with only T.sblock (not sblock_alloc_buffer) only need check_well_formed=False
          find python/mlc_llm/compiler_pass -name '*.py' -exec grep -l '@T.prim_func' {} \; | while read f; do
            if ! grep -q 'T\.sblock_alloc_buffer' "$f"; then
              echo "Patching $f (compiler_pass, sblock only)"
              sed -i 's/@T\.prim_func$/@T.prim_func(check_well_formed=False)/' "$f"
              sed -i 's/@T\.prim_func(private=True)$/@T.prim_func(private=True, check_well_formed=False)/' "$f"
            fi
          done
          echo "Patch done"

      - name: Patch low_batch_specialization.py for structural_equal compat
        run: |
          python3 << 'PYEOF'
          src = open("python/mlc_llm/compiler_pass/low_batch_specialization.py").read()

          # 1. Replace tvm.ir.structural_equal with _structural_equal
          src = src.replace(
              "tvm.ir.structural_equal(low_batch_func, func)",
              "_structural_equal(low_batch_func, func)"
          )

          # 2. Wrap Matmul() in try/except to skip non-GEMM functions
          old = "                gemm_mod = dl.ApplyDefaultSchedule(\n                    dl.gpu.Matmul(),\n                )(gemm_mod)"
          new = "                try:\n                    gemm_mod = dl.ApplyDefaultSchedule(\n                        dl.gpu.Matmul(),\n                    )(gemm_mod)\n                except (ValueError, TypeError, RuntimeError):\n                    continue"
          src = src.replace(old, new)

          # 3. Insert _structural_equal helper after the last import line
          src = src.replace(
              "from tvm.s_tir import dlight as dl\n",
              "from tvm.s_tir import dlight as dl\n\ndef _structural_equal(a, b):\n    try:\n        import tvm\n        tvm.ir.assert_structural_equal(a, b)\n        return True\n    except (ValueError, TypeError):\n        return False\n\n"
          )

          open("python/mlc_llm/compiler_pass/low_batch_specialization.py", "w").write(src)
          print("Patched low_batch_specialization.py")
          PYEOF

      - name: Patch Dlight Matmul rule to handle non-root-block functions
        run: |
          python3 << 'PYEOF'
          src = open("3rdparty/tvm/python/tvm/s_tir/dlight/gpu/matmul.py").read()
          # Wrap get_root_block call in try/except to skip functions without root block
          src = src.replace(
              "        root_block = get_root_block(sch)",
              "        try:\n            root_block = get_root_block(sch)\n        except ValueError:\n            return None"
          )
          open("3rdparty/tvm/python/tvm/s_tir/dlight/gpu/matmul.py", "w").write(src)
          print("Patched matmul.py")
          PYEOF

      - name: Patch lift_global_buffer_alloc.py to skip non-root-block funcs
        run: |
          python3 << 'PYEOF'
          src = open("python/mlc_llm/compiler_pass/lift_global_buffer_alloc.py").read()
          # Skip PrimFuncs without SBlockRealize body (they have no root block / global alloc)
          src = src.replace(
              "            if isinstance(func, tirx.PrimFunc):",
              "            if isinstance(func, tirx.PrimFunc) and isinstance(func.body, tirx.SBlockRealize):"
          )
          open("python/mlc_llm/compiler_pass/lift_global_buffer_alloc.py", "w").write(src)
          print("Patched lift_global_buffer_alloc.py")
          PYEOF

      - name: Patch attach_spec_decode_aux_funcs.py with GPU thread bindings
        run: |
          python3 -c "
          import base64
          content = base64.b64decode('')
          with open('python/mlc_llm/compiler_pass/attach_spec_decode_aux_funcs.py', 'w') as f:
              f.write(content.decode('utf-8'))
          print('Patched attach_spec_decode_aux_funcs.py')
          "

      - name: Patch Logging.cmake for mlc4j build compatibility
        run: |
          python3 << 'PYEOF'
          path = "3rdparty/tvm/cmake/modules/Logging.cmake"
          src = open(path).read()
          # Guard tvm_libinfo_objs target that doesn't exist in mlc4j runtime-only build
          src = src.replace(
              "target_compile_definitions(tvm_libinfo_objs PUBLIC TVM_LOG_CUSTOMIZE=1)",
              "if(TARGET tvm_libinfo_objs)\n  target_compile_definitions(tvm_libinfo_objs PUBLIC TVM_LOG_CUSTOMIZE=1)\nendif()"
          )
          open(path, "w").write(src)
          print("Patched Logging.cmake")
          PYEOF

      - name: Build mlc-llm from source
        run: |
          export LD_LIBRARY_PATH="$TVM_LIB_DIR:$LD_LIBRARY_PATH"
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_LLVM=llvm-config-15 \
            -DUSE_VULKAN=OFF \
            -DUSE_CUDA=OFF \
            -DUSE_OPENCL=OFF \
            -DUSE_METAL=OFF \
            -DUSE_ROCM=OFF
          ninja -j$(nproc)
          cd ..
          pip install -e .

      - name: Test NDK compiler
        run: |
          CC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
          echo "NDK_CC=$CC"
          ls -la "$CC" 2>/dev/null || echo "CC NOT FOUND"
          $CC --version 2>&1 || echo "CC failed"

      - name: Link TVM source runtime dir so tvm_runtime.h includes resolve
        run: |
          # tvm_runtime.h uses <runtime/xxx.cc> includes that need TVM_SOURCE_DIR/src
          # as an include path.  Symlink TVM's runtime/ into android/mlc4j/src/cpp/
          # so the include path android/mlc4j/src/cpp resolves them.
          RUNTIME_DST="android/mlc4j/src/cpp/runtime"
          if [ ! -L "$RUNTIME_DST" ] && [ ! -d "$RUNTIME_DST" ]; then
            ln -sf "$PWD/$TVM_DIR/src/runtime" "$RUNTIME_DST"
            echo "Linked $TVM_DIR/src/runtime -> $RUNTIME_DST"
            ls -la "$RUNTIME_DST"
          else
            echo "runtime/ already exists at $RUNTIME_DST"
          fi

      - name: Configure and compile model directly
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          TVM_NDK_CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          TVM_BACKTRACE: "1"
          MLC_LLM_SOURCE_DIR: ${{ github.workspace }}
        run: |
          export LD_LIBRARY_PATH="$TVM_LIB_DIR:$LD_LIBRARY_PATH"
          mkdir -p android/MLCChat
          printf '{\n  "device": "android",\n  "model_list": [\n    {\n      "model": "HF://mlc-ai/Qwen3-0.6B-q4f16_1-MLC",\n      "model_id": "Qwen3-0.6B-q4f16_1-MLC",\n      "estimated_vram_bytes": 800000000,\n      "overrides": {\n        "prefill_chunk_size": 128,\n        "context_window_size": 2048\n      }\n    }\n  ]\n}\n' > android/MLCChat/mlc-package-config.json

      - name: Compile model library
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          TVM_NDK_CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          TVM_BACKTRACE: "1"
          MLC_LLM_SOURCE_DIR: ${{ github.workspace }}
        run: |
          export LD_LIBRARY_PATH="$TVM_LIB_DIR:$LD_LIBRARY_PATH"
          cd android/MLCChat
          python -m mlc_llm package 2>&1

      - name: Upload compiled model library
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-q4f16_1-android-model-lib
          path: |
            android/MLCChat/dist/libs/*.tar
            android/MLCChat/dist/bundle/
            android/MLCChat/dist/lib/
          if-no-files-found: warn
