name: Compile Qwen3-0.6B-q4f16_1 for Android

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mlc-llm
        uses: actions/checkout@v4
        with:
          repository: mlc-ai/mlc-llm
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install build deps and mlc packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build llvm-15-dev lld-15 clang-15 libtinfo-dev
          pip install --pre -U -f https://mlc.ai/wheels mlc-llm-nightly-cpu mlc-ai-nightly-cpu
          pip install psutil requests tqdm numpy

      - name: Fix libtvm.so
        run: |
          TVM_PKG=$(python -c "import tvm; import os; print(os.path.dirname(tvm.__file__))")
          TVM_LIB="$TVM_PKG/lib"
          echo "TVM lib dir: $TVM_LIB"
          ls -la "$TVM_LIB"
          # Find libmlc_llm_module.so without importing mlc_llm (would fail without fix)
          MLC_LIB=$(find /opt/hostedtoolcache /usr -name "libmlc_llm_module.so" 2>/dev/null | head -1)
          if [ -n "$MLC_LIB" ]; then
            echo "Checking libmlc_llm_module.so NEEDED..."
            (readelf -d "$MLC_LIB" 2>/dev/null | grep NEEDED) || (objdump -p "$MLC_LIB" 2>/dev/null | grep NEEDED) || echo "(no NEEDED info)"
          fi
          # Symlink libtvm.so to compiler lib (has both runtime and compiler symbols)
          if [ -f "$TVM_LIB/libtvm_compiler.so" ]; then
            ln -sf "$TVM_LIB/libtvm_compiler.so" "$TVM_LIB/libtvm.so"
            echo "Symlinked libtvm.so -> libtvm_compiler.so"
          elif [ -f "$TVM_LIB/libtvm_runtime.so" ]; then
            ln -sf "$TVM_LIB/libtvm_runtime.so" "$TVM_LIB/libtvm.so"
            echo "Symlinked libtvm.so -> libtvm_runtime.so"
          fi
          echo "TVM_LIB_DIR=$TVM_LIB" >> $GITHUB_ENV

      - name: HuggingFace login (optional)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            pip install huggingface_hub -q
            python -c "from huggingface_hub import login; login('$HF_TOKEN')"
          fi

      - name: Verify mlc_llm import works
        run: |
          export LD_LIBRARY_PATH="$TVM_LIB_DIR:$LD_LIBRARY_PATH"
          python -c "
import ctypes, os
lib = os.path.join(os.environ['TVM_LIB_DIR'], 'libtvm_runtime.so')
ctypes.CDLL(lib, mode=ctypes.RTLD_GLOBAL)
import mlc_llm
print('mlc_llm imported OK')
"

      - name: Configure for Qwen3-0.6B-q4f16_1-MLC
        run: |
          mkdir -p android/MLCChat
          cat > android/MLCChat/mlc-package-config.json << 'YAMLEOF'
          {
            "device": "android",
            "model_list": [
              {
                "model": "HF://NakshatraNeha/Qwen3-0.6B-q4f16_1-MLC",
                "model_id": "Qwen3-0.6B-q4f16_1-MLC",
                "estimated_vram_bytes": 800000000,
                "overrides": {
                  "prefill_chunk_size": 128,
                  "context_window_size": 2048
                }
              }
            ]
          }
          YAMLEOF

      - name: Write wrapper script for mlc_llm package
        run: |
          printf 'import ctypes, os, sys\ntvm_lib_dir = os.environ["TVM_LIB_DIR"]\nctypes.CDLL(os.path.join(tvm_lib_dir, "libtvm_runtime.so"), mode=ctypes.RTLD_GLOBAL)\nos.chdir(os.path.join(os.environ["MLC_LLM_SOURCE_DIR"], "android", "MLCChat"))\nsys.argv = ["mlc_llm", "package"]\nfrom mlc_llm.__main__ import main\nmain()\n' > wrapper.py

      - name: Compile model library
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          TVM_NDK_CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          MLC_LLM_SOURCE_DIR: ${{ github.workspace }}
        run: |
          export LD_LIBRARY_PATH="$TVM_LIB_DIR:$LD_LIBRARY_PATH"
          python wrapper.py

      - name: Upload compiled model library
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-q4f16_1-android-model-lib
          path: |
            android/MLCChat/dist/libs/*.tar
            android/MLCChat/dist/bundle/
            android/MLCChat/dist/lib/
          if-no-files-found: warn
