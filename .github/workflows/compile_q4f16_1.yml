name: Compile Qwen3-0.6B-q4f16_1 for Android

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mlc-llm
        uses: actions/checkout@v4
        with:
          repository: mlc-ai/mlc-llm
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install build deps and check TVM structure
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build llvm-15-dev lld-15 clang-15 libtinfo-dev
          pip install psutil requests tqdm numpy
          # Find TVM dir
          if [ -d "3rdparty/tvm" ]; then echo "TVM_DIR=3rdparty/tvm" >> $GITHUB_ENV
          elif [ -d "tvm" ]; then echo "TVM_DIR=tvm" >> $GITHUB_ENV
          else echo "TVM not found!"; exit 1; fi
          # Check TVM Python structure
          echo "=== tvm/__init__.py (first 30 lines) ==="
          head -30 $TVM_DIR/python/tvm/__init__.py 2>/dev/null || echo "(no __init__.py)"
          echo "=== ls tvm/python/tvm ==="
          ls -la $TVM_DIR/python/tvm/ 2>/dev/null
          echo "=== Looking for setup.py ==="
          find $TVM_DIR -name "setup.py" -maxdepth 3 2>/dev/null
          echo "=== Looking for _ffi ==="
          find $TVM_DIR -name "_ffi" -maxdepth 4 2>/dev/null

      - name: Build TVM from source
        run: |
          cd $TVM_DIR
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_LLVM=llvm-config-15 \
            -DUSE_VULKAN=OFF \
            -DUSE_CUDA=OFF \
            -DUSE_OPENCL=OFF \
            -DUSE_METAL=OFF \
            -DUSE_ROCM=OFF \
            -DHIDE_PRIVATE_SYMBOLS=OFF
          ninja -j$(nproc)
          echo "TVM_BUILD_DIR=$PWD" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}/$TVM_DIR/python" >> $GITHUB_ENV

      - name: Patch tvm.contrib modules
        run: |
          CONTRIB="${{ github.workspace }}/$TVM_DIR/python/tvm/contrib"
          # ndk.py - no _ffi import, use subprocess directly
          grep -q "create_shared" "$CONTRIB/ndk.py" 2>/dev/null || printf 'import subprocess\ndef create_shared(output, objects, options=None, cc_exe="aarch64-linux-android24-clang"):\n    cmd = [cc_exe, "-shared", "-o", output] + list(objects)\n    if options:\n        cmd.extend(options)\n    subprocess.check_call(cmd)\n    return output\ndef cross_compiler(compile_func):\n    return compile_func\n' > "$CONTRIB/ndk.py"
          # tar.py
          grep -q "tar(" "$CONTRIB/tar.py" 2>/dev/null || printf 'import os, tarfile\ndef tar(output, files):\n    with tarfile.open(output, "w:") as tf:\n        for f in files:\n            tf.add(f, arcname=os.path.basename(f))\n    return output\n' > "$CONTRIB/tar.py"
          # xcode.py
          [ -f "$CONTRIB/xcode.py" ] || printf '# stub\n' > "$CONTRIB/xcode.py"
          echo "Patched contrib modules"

      - name: Build mlc-llm from source
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/$TVM_DIR/build:$LD_LIBRARY_PATH"
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_LLVM=llvm-config-15 \
            -DUSE_VULKAN=OFF \
            -DUSE_CUDA=OFF \
            -DUSE_OPENCL=OFF \
            -DUSE_METAL=OFF \
            -DUSE_ROCM=OFF
          ninja -j$(nproc)
          cd ..
          pip install -e .

      - name: Write compile wrapper
        run: |
          printf 'import ctypes, os, sys\nlibs_dir = os.path.join(os.environ["TVM_BUILD_DIR"])\nctypes.CDLL(os.path.join(libs_dir, "libtvm_runtime.so"), mode=ctypes.RTLD_GLOBAL)\nctypes.CDLL(os.path.join(libs_dir, "libtvm.so"), mode=ctypes.RTLD_GLOBAL)\nos.chdir(os.path.join(os.environ["MLC_LLM_SOURCE_DIR"], "android", "MLCChat"))\nsys.argv = ["mlc_llm", "package"]\nfrom mlc_llm.__main__ import main\nmain()\n' > wrapper.py

      - name: HuggingFace login (optional)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            pip install huggingface_hub -q
            python -c "from huggingface_hub import login; login('$HF_TOKEN')"
          fi

      - name: Configure for Qwen3-0.6B-q4f16_1-MLC
        run: |
          mkdir -p android/MLCChat
          printf '{\n  "device": "android",\n  "model_list": [\n    {\n      "model": "HF://NakshatraNeha/Qwen3-0.6B-q4f16_1-MLC",\n      "model_id": "Qwen3-0.6B-q4f16_1-MLC",\n      "estimated_vram_bytes": 800000000,\n      "overrides": {\n        "prefill_chunk_size": 128,\n        "context_window_size": 2048\n      }\n    }\n  ]\n}\n' > android/MLCChat/mlc-package-config.json

      - name: Compile model library
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          TVM_NDK_CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          MLC_LLM_SOURCE_DIR: ${{ github.workspace }}
        run: |
          export LD_LIBRARY_PATH="$TVM_BUILD_DIR:$LD_LIBRARY_PATH"
          python wrapper.py

      - name: Upload compiled model library
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-q4f16_1-android-model-lib
          path: |
            android/MLCChat/dist/libs/*.tar
            android/MLCChat/dist/bundle/
            android/MLCChat/dist/lib/
          if-no-files-found: warn
