name: Compile Qwen3-0.6B-q4f16_1 for Android

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mlc-llm
        uses: actions/checkout@v4
        with:
          repository: mlc-ai/mlc-llm
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake ninja-build llvm-15-dev lld-15 clang-15 libtinfo-dev
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add aarch64-linux-android

      - name: Find TVM submodule location
        run: |
          if [ -d "3rdparty/tvm" ]; then
            echo "TVM_DIR=3rdparty/tvm" >> $GITHUB_ENV
          elif [ -d "tvm" ]; then
            echo "TVM_DIR=tvm" >> $GITHUB_ENV
          else
            echo "TVM not found!"; exit 1
          fi

      - name: Debug TVM structure
        run: |
          echo "=== TVM dir contents ==="
          ls -la $TVM_DIR
          echo "=== TVM/python/tvm/ ==="
          ls -la $TVM_DIR/python/tvm/ 2>/dev/null
          echo "=== TVM/python ==="
          ls -la $TVM_DIR/python/ 2>/dev/null
          echo "=== setup.py check ==="
          find $TVM_DIR -name "setup.py" -maxdepth 4 2>/dev/null
          echo "=== _ffi check ==="
          ls -la $TVM_DIR/python/tvm/_ffi/ 2>/dev/null
          echo "=== build output ==="
          ls -la $TVM_DIR/build/ 2>/dev/null | head -20
          find $TVM_DIR/build -name "*.so" -maxdepth 3 2>/dev/null

      - name: Build TVM from source
        run: |
          cd $TVM_DIR
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_LLVM=llvm-config-15 \
            -DUSE_VULKAN=OFF \
            -DUSE_CUDA=OFF \
            -DUSE_OPENCL=OFF \
            -DUSE_METAL=OFF \
            -DUSE_ROCM=OFF \
            -DHIDE_PRIVATE_SYMBOLS=ON \
            -DUSE_LIBBACKTRACE=AUTO \
            -DUSE_CCACHE=OFF
          ninja -j$(nproc)
          echo "TVM_BUILD_DIR=$PWD" >> $GITHUB_ENV
          echo "PYTHONPATH=${{ github.workspace }}/$TVM_DIR/python" >> $GITHUB_ENV

      - name: Install TVM pip package (for Python extensions)
        run: |
          pip install --pre -U -f https://mlc.ai/wheels mlc-ai-nightly-cpu
          # Find tvm lib dir and create libtvm.so symlink
          TVM_LIB=$(python -c "import tvm; import os; print(os.path.join(os.path.dirname(tvm.__file__), 'lib'))")
          echo "TVM pip lib dir: $TVM_LIB"
          ls -la "$TVM_LIB"
          ln -sf "$TVM_LIB/libtvm_runtime.so" "$TVM_LIB/libtvm.so" 2>/dev/null || true
          ln -sf "$TVM_LIB/libtvm_compiler.so" "$TVM_LIB/libtvm.so" 2>/dev/null || true

      - name: Ensure tvm.contrib has ndk module
        run: |
          TVM_CONTRIB_DIR="${{ github.workspace }}/$TVM_DIR/python/tvm/contrib"
          echo "=== Contents of $TVM_CONTRIB_DIR ==="
          ls -la "$TVM_CONTRIB_DIR"
          if [ ! -f "$TVM_CONTRIB_DIR/ndk.py" ]; then
            printf 'import tvm\nimport tvm._ffi\nfrom tvm.contrib import cc\n\ndef create_shared(output, objects, options=None, cc_exe="aarch64-linux-android24-clang"):\n    return cc.create_shared(output, objects, options, cc_exe)\n\ndef cross_compiler(compile_func):\n    return tvm._ffi.register_func("tvm.cross_compiler", compile_func, override=True)\n' > "$TVM_CONTRIB_DIR/ndk.py"
            echo "Created ndk.py"
          fi
          if [ ! -f "$TVM_CONTRIB_DIR/tar.py" ]; then
            printf 'import os, tarfile\n\ndef tar(output, files):\n    with tarfile.open(output, "w:") as tf:\n        for f in files:\n            tf.add(f, arcname=os.path.basename(f))\n    return output\n' > "$TVM_CONTRIB_DIR/tar.py"
            echo "Created tar.py"
          fi
          if [ ! -f "$TVM_CONTRIB_DIR/xcode.py" ]; then
            printf '# stub\n' > "$TVM_CONTRIB_DIR/xcode.py"
            echo "Created xcode.py"
          fi

      - name: Build mlc-llm from source (C++ libs only)
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_LLVM=llvm-config-15 \
            -DUSE_VULKAN=OFF \
            -DUSE_CUDA=OFF \
            -DUSE_OPENCL=OFF \
            -DUSE_METAL=OFF \
            -DUSE_ROCM=OFF
          ninja -j$(nproc)
          cd ..
          pip install -e .

      - name: HuggingFace login (optional)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            pip install huggingface_hub -q
            python -c "from huggingface_hub import login; login('$HF_TOKEN')"
          fi

      - name: Configure for Qwen3-0.6B-q4f16_1-MLC
        run: |
          mkdir -p android/MLCChat
          cat > android/MLCChat/mlc-package-config.json << 'EOF'
          {
            "device": "android",
            "model_list": [
              {
                "model": "HF://NakshatraNeha/Qwen3-0.6B-q4f16_1-MLC",
                "model_id": "Qwen3-0.6B-q4f16_1-MLC",
                "estimated_vram_bytes": 800000000,
                "overrides": {
                  "prefill_chunk_size": 128,
                  "context_window_size": 2048
                }
              }
            ]
          }
          EOF

      - name: Compile model library
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          TVM_NDK_CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          MLC_LLM_SOURCE_DIR: ${{ github.workspace }}
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/$TVM_DIR/build:${{ github.workspace }}/build:$LD_LIBRARY_PATH"
          cd android/MLCChat
          python -m mlc_llm package

      - name: Upload compiled model library
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-q4f16_1-android-model-lib
          path: |
            android/MLCChat/dist/libs/*.tar
            android/MLCChat/dist/bundle/
            android/MLCChat/dist/lib/
          if-no-files-found: warn
